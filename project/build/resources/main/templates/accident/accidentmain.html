<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css" th:href="@{/style.css}">
<html lang="en">
<style>
    table {
        border-collapse: collapse;
    }

    tr, td, th {
        border: 1px solid black;
        width: 150px;
    }
</style>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h3>사고 게시판</h3>
    <nav>
        <ul>
            <li>사고 전체 게시판</li>
            <li>사고유형</li>
            <li><a th:href="@{/accidentwriting}">글쓰기</a></li>
        </ul>
    </nav>
    <br>
    <table>
    <tr>
        <td>게시글 번호</td>
        <td>제목</td>
        <td>작성자</td>
        <td>작성일</td>
    </tr>
    <tr th:each="list : ${writegetlist}">
        <td th:text="${list.id}">dd</td>
        <td th:text="${list.title}"></td>
        <td>회원가입 미작성</td>
        <td th:text="${#temporals.format(list.createDate, 'yyyy-MM-dd HH:mm')}"
            thymeleaf></td>
    </tr>
    </table>
</body>
</html>
