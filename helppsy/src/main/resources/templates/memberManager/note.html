<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쪽지</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .note-container {
            max-width: 800px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 15px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
        }

        .button-group {
            text-align: center;
            margin-top: 20px;
        }

        .button-group input[type="button"] {
            padding: 10px 25px;
            font-size: 14px;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .button-group input[type="button"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="note-container">
    <h2>쪽지 목록</h2>
    <table>
        <tr>
            <th>발신자</th>
            <th>제목</th>
            <th>내용</th>
            <th>발신일</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
    <h2>메시지를 남겨주세요</h2>

    <label for="note">노트 작성란</label>
    <textarea id="note" rows="6" placeholder="쪽지를 입력하세요..."></textarea>

    <div class="button-group">
        <a href="profile"><input type="button" value="저장"></a>
    </div>
</div>

</body>
</html>
